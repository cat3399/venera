name: Android Debug APK (arm64)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch/tag/SHA). Leave empty to use current ref.
        required: false
        default: ""

jobs:
  build_debug_apk_arm64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "oracle"
          java-version: "17"

      # android/app/build.gradle requires android/key.properties to exist (even for debug builds).
      - name: Set up Android signing files
        env:
          STORE_FILE: ${{ secrets.ANDROID_KEYSTORE }}
          PROPERTY_FILE: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$STORE_FILE" ] && [ -n "$PROPERTY_FILE" ]; then
            echo "$STORE_FILE" | base64 --decode > android/keystore.jks
            echo "$PROPERTY_FILE" > android/key.properties
          else
            echo "Secrets ANDROID_KEYSTORE / ANDROID_KEY_PROPERTIES not set, generating a debug keystore..."
            keytool -genkeypair -v \
              -keystore android/keystore.jks \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -noprompt
            cat > android/key.properties <<'EOF'
          storeFile=../keystore.jks
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          EOF
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build debug APK (arm64 only)
        run: flutter build apk --debug --split-per-abi --target-platform android-arm64

      - name: List built APKs
        run: |
          ls -la build/app/outputs || true
          find build/app/outputs -name "*.apk" -maxdepth 6 -print || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-arm64-apk
          if-no-files-found: error
          path: |
            build/app/outputs/flutter-apk/*arm64*debug*.apk
            build/app/outputs/apk/debug/*arm64*debug*.apk
